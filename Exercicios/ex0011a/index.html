<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colocando videos na web</title>
</head>
<body>
    <p>segue o video abaixo</p>
    
    
    <video controls width="560" poster="ibagens comandante amilton/images.jpg">
        <source controls src="videos/Video de novo 3840 2160 30Fps.mp4"  media="(max-width:750)" type="video/mp4">
        <source type="video/mp4" controls media="(max-width:1050 )"  src="videos/Video De Novo 3840 2160 30Fps.mkv">
        <source controls src="videos/Video De Novo 3840 2160 30Fps.webm" type="video/webm">
        <p>seu navegador não tem compatibilidade com produção de videos.</p>

    </video>
    <p>inserindo videos do youtube</p>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/FdE5G95B7Mg?si=pgD6yqNteJSQYuM0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
