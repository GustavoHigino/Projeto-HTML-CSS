<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1{
            background-color:antiquewhite;
            width: 300px;
            height: 300px;
            border-width: 10px;
            border-style:solid;
            border-color: black;
            /*border: 10px solid black;*/
            padding-left: 10px;
            padding-bottom: 10px;
            padding-right: 10px;
            padding-top: 10px;
            /*padding: 10px 10px 10px 10px;*/
            margin-top: 40px;
            margin-right: 40px;
            margin-bottom: 40px;
            margin-left: 40px;
            /*margin:10px 10px 10px 10px;*/
            /*margin:10px auto 10px auto;*/
            outline-width: 15px;
            outline-color: aqua;
            outline-style: solid;
            /*outline: 10px solid black;*/
        }
        a{
            border-width: 10px;
            border-style: solid;
            border-color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Caixa Box-level</h1>
    <p>Paragrafos são exemplo de box-level mas <a href="#">links são exemplos de inline-level</a> vamos ver como tudo isso funciona</p>
</body>
</html>
