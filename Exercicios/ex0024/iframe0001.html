<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iframe</title>
    <style>
        iframe{
            width: 400px;
            height: 400px;/*vale oque esta nas css*/
        }
    </style>
</head>
<body>
    <h1>Testando o uso de um iframe</h1>
    <p>Acessando o site do 
        <a href="https://www.cursoemvideo.com" target="_blank"></a> para aprender a programar.</p>
    <p>acessando o site do
        <!--tamanho padrão 300x150-->
        <iframe src="https://www.cursoemvideo.com" frameborder="0" height="500" width="500" scrolling="auto">
            <a href="https://www.cursoemvideo.com">Curso em Video</a>
        </iframe>
        para aprender a programar</p>
    <p>o site do google também é muito legal <iframe src="https://www.google.com.br" frameborder="0">[seu navegador não é compativel com isso]</iframe> </p><!--exemplo de site que tem proteção contra iframe e essa mensagem em [] e caso o navegador não seja compativel com iframe
    -->
</body>
</html>
