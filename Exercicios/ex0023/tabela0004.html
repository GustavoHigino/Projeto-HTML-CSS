<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXERCICIO DE TABELAS</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            
        }
        table{
            border-collapse: collapse;
            width:500px ;
        }
        th,td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        .destaque{
            background-color: aquamarine;
        }
        col.cnome{
            background-color: blue;
        }
        col.cgroup{
            background-color: brown;
        }
    </style>
</head>
<body>
    <h1>EXERCICIO DE TABELA</h1>
    <table>
        <colgroup>
            <col class="cnome">
            <col class="cgroup" span="2">
            
            <col class="cprof">
        </colgroup>
        <caption>
            Cadastro
        </caption>
        <tr>
            <th scope="col">
                Nome
            </th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Felip</td>
            <td>M</td>
            <td>26</td>
            <td>garçom</td>
        </tr>
        <tr class="destaque">
            <td>AJara</td>
            <td>F</td>
            <td>27</td>
            <td>atendente</td>
        </tr>
        <tr>
            <td>Mario</td>
            <td>M</td>
            <td>28</td>
            <td>guardanapo</td>
        </tr>
        <tr>
            <td>Ana </td>
            <td>F</td>
            <td>29</td>
            <td>garçonete</td>
        </tr>
    </table>
</body>
</html>
